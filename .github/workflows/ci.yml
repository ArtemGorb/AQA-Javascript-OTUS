name: test

on: push

jobs:
  codestyle:
    runs-on: ubuntu-latest    
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24.3.0
          cache: 'npm'
      - run: npm ci
      - run: npm run lint:ci

  type-check:
    runs-on: ubuntu-latest   
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24.3.0
          cache: 'npm'
      - run: npm ci
      - run: npm run type-check
 
  test:
    needs:
      - codestyle
      - type-check
    runs-on: ubuntu-latest   
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24.3.0
          cache: 'npm'
      - run: npm ci
      - run: echo "${{vars.ENV_FILE}}" >> .env
      - run: npm run test

  notify:
    needs:
      - test
    if: always()
    runs-on: ubuntu-latest   
    steps:
      - run: |
          curl --request POST --url "https://api.telegram.org/bot${{secrets.TELEGRAM_TOKEN}}/sendMessage" --header 'Content-Type: application/json' --data '{"chat_id": "${{secrets.TELEGRAM_CHAT_ID}}", "text": "Report link: https://github.com/${{github.repository}}/actions/runs/${{github.run_id}}"}'

      