name: test

on: push

jobs:
  codestyle:
    runs-on: ubuntu-latest    
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24.3.0
          cache: 'npm'
      - run: npm ci
      - run: npm run lint:ci

  type-check:
    runs-on: ubuntu-latest   
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24.3.0
          cache: 'npm'
      - run: npm ci
      - run: npm run type-check
 
  test:
    needs:
      - codestyle
      - type-check
    runs-on: ubuntu-latest   
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24.3.0
          cache: 'npm'
      - run: npm ci
      - run: echo "${{vars.ENV_FILE}}" >> .env
      - run: npm run test